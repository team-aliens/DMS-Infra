global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets:
          - "GATEWAY_IP:9100"
          - "MAIN_IP:9100"
          - "NOTIFICATION_IP:9100"
          - "INFRA_IP:9100"
          - "localhost:9100"        
        labels:
          env: prod

