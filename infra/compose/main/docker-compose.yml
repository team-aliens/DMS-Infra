# Main 인스턴스: dms-main(8081) + node_exporter
name: dms-main

services:
  main:
    image: ${MAIN_IMAGE}
    restart: unless-stopped
    env_file: .env
    environment:
      PROFILE: prod
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Seoul
    ports:
      - "8081:8081"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    pid: host
    command: ["--path.rootfs=/host"]
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
